<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display:grid; grid-template-columns:repeat(9,1fr); gap:8px; }
  .sw { aspect-ratio:1/1; border-radius:4px; position:relative; border:1px solid rgba(60,56,54,0.10); }
  .sw .name { position:absolute; left:6px; bottom:6px; font-size:9px; font-family:var(--font-mono); }
  .sw .hex  { position:absolute; right:6px; top:6px; font-size:9px; font-family:var(--font-mono); }
</style></head>
<body>
<div class="card" style="padding:18px 22px; gap:10px;">
  <div class="label">Light Hard · backgrounds</div>
  <div class="scale">
    <div class="sw" style="background:#f9f5d7"><span class="name">bg/0</span><span class="hex">f9f5d7</span></div>
    <div class="sw" style="background:#fbf1c7"><span class="name">bg/1</span><span class="hex">fbf1c7</span></div>
    <div class="sw" style="background:#ebdbb2"><span class="name">bg/2</span><span class="hex">ebdbb2</span></div>
    <div class="sw" style="background:#d5c4a1"><span class="name">bg/3</span><span class="hex">d5c4a1</span></div>
    <div class="sw" style="background:#bdae93"><span class="name">bg/4</span><span class="hex">bdae93</span></div>
    <div class="sw" style="background:#7c6f64"><span class="name" style="color:#fbf1c7">fg.mu</span><span class="hex" style="color:#fbf1c7">7c6f64</span></div>
    <div class="sw" style="background:#3c3836"><span class="name" style="color:#fbf1c7">fg/2</span><span class="hex" style="color:#fbf1c7">3c3836</span></div>
    <div class="sw" style="background:#282828"><span class="name" style="color:#fbf1c7">fg/1</span><span class="hex" style="color:#fbf1c7">282828</span></div>
    <div class="sw" style="background:#1d2021"><span class="name" style="color:#fbf1c7">fg/0</span><span class="hex" style="color:#fbf1c7">1d2021</span></div>
  </div>
</div>
</body></html>
