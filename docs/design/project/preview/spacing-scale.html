<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:flex-end; gap:10px; }
  .stack { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .blk { background:var(--gb-dark-yellow); width:14px; }
  .nm { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); }
  .px { font-size:10px; color:var(--text-strong); font-family:var(--font-mono); }
</style></head>
<body>
<div class="card" style="padding:18px 24px; gap:12px;">
  <div class="label">Spacing scale (px)</div>
  <div class="row">
    <div class="stack"><div class="blk" style="height:0px;"></div><div class="px">0</div><div class="nm">0</div></div>
    <div class="stack"><div class="blk" style="height:2px;"></div><div class="px">2</div><div class="nm">1</div></div>
    <div class="stack"><div class="blk" style="height:4px;"></div><div class="px">4</div><div class="nm">2</div></div>
    <div class="stack"><div class="blk" style="height:6px;"></div><div class="px">6</div><div class="nm">3</div></div>
    <div class="stack"><div class="blk" style="height:8px;"></div><div class="px">8</div><div class="nm">4</div></div>
    <div class="stack"><div class="blk" style="height:12px;"></div><div class="px">12</div><div class="nm">5</div></div>
    <div class="stack"><div class="blk" style="height:16px;"></div><div class="px">16</div><div class="nm">6</div></div>
    <div class="stack"><div class="blk" style="height:20px;"></div><div class="px">20</div><div class="nm">7</div></div>
    <div class="stack"><div class="blk" style="height:24px;"></div><div class="px">24</div><div class="nm">8</div></div>
    <div class="stack"><div class="blk" style="height:32px;"></div><div class="px">32</div><div class="nm">9</div></div>
    <div class="stack"><div class="blk" style="height:48px;"></div><div class="px">48</div><div class="nm">10</div></div>
  </div>
  <div style="font-size:10px; color:var(--text-muted);">Aligned to monospace cell width — use 4px / 8px increments for grid-snapped UI; 2/6 for fine-tuned spacing.</div>
</div>
</body></html>
