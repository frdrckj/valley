<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .sw { aspect-ratio:1/1.05; border-radius:4px; position:relative; }
  .sw .n { position:absolute; left:6px; bottom:6px; font-size:9px; color:#1d2021; font-family:var(--font-mono); font-weight:500; }
  .sw .h { position:absolute; right:6px; top:6px; font-size:9px; color:#1d2021; opacity:0.7; font-family:var(--font-mono); }
</style></head>
<body>
<div class="card" style="padding:18px 22px; gap:10px;">
  <div class="label">Dark · accents</div>
  <div class="grid">
    <div class="sw" style="background:#fb4934"><span class="n">red</span><span class="h">fb4934</span></div>
    <div class="sw" style="background:#b8bb26"><span class="n">green</span><span class="h">b8bb26</span></div>
    <div class="sw" style="background:#fabd2f"><span class="n">yellow</span><span class="h">fabd2f</span></div>
    <div class="sw" style="background:#83a598"><span class="n">blue</span><span class="h">83a598</span></div>
    <div class="sw" style="background:#d3869b"><span class="n">purple</span><span class="h">d3869b</span></div>
    <div class="sw" style="background:#8ec07c"><span class="n">aqua</span><span class="h">8ec07c</span></div>
    <div class="sw" style="background:#fe8019"><span class="n">orange</span><span class="h">fe8019</span></div>
  </div>
</div>
</body></html>
