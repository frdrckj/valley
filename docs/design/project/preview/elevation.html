<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:24px; gap:18px; flex-direction:row; align-items:flex-end; justify-content:space-around;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div style="width:140px; height:84px; background:var(--surface-elevated); border:1px solid var(--border-subtle); border-radius:6px;"></div>
    <div style="font-size:11px; color:var(--text-strong); font-family:var(--font-mono);">flat</div>
    <div style="font-size:10px; color:var(--text-muted); font-family:var(--font-mono);">border.subtle only · panels, sidebar</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div style="width:140px; height:84px; background:var(--gb-dark-bg-2); border:1px solid var(--border-subtle); border-radius:8px; box-shadow: 0 2px 6px rgba(0,0,0,0.30), 0 12px 32px rgba(0,0,0,0.45);"></div>
    <div style="font-size:11px; color:var(--text-strong); font-family:var(--font-mono);">floating</div>
    <div style="font-size:10px; color:var(--text-muted); font-family:var(--font-mono);">omnibar · dropdowns · popovers</div>
  </div>
  <div style="font-size:10px; color:var(--text-muted); max-width:160px; line-height:1.5;">Two tiers only. Borders carry the heavy lifting. No inset shadows, no gradients.</div>
</div>
</body></html>
