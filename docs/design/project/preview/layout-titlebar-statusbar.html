<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:0; gap:0;">
  <!-- title bar -->
  <div style="height:36px; background:var(--gb-dark-bg-1); display:flex; align-items:center; padding:0 12px; gap:8px; border-bottom:1px solid var(--border-subtle);">
    <div style="display:flex; gap:8px;">
      <span style="width:12px; height:12px; border-radius:50%; background:#ff5f57;"></span>
      <span style="width:12px; height:12px; border-radius:50%; background:#febc2e;"></span>
      <span style="width:12px; height:12px; border-radius:50%; background:#28c840;"></span>
    </div>
    <div style="flex:1;"></div>
    <div style="font-size:11px; color:var(--text-muted);">~/code/valley · main</div>
  </div>
  <!-- status bar -->
  <div style="height:24px; background:var(--gb-dark-bg-0); border-top:1px solid var(--border-subtle); display:flex; align-items:center; padding:0 10px; gap:14px; font-size:11px; color:var(--text-muted);">
    <span style="display:inline-flex; align-items:center; gap:6px;"><span class="dot purple"></span> valley · ready</span>
    <span style="display:inline-flex; align-items:center; gap:6px;"><span class="dot green"></span> 0 errors</span>
    <span>UTF-8</span>
    <span>LF</span>
    <span style="margin-left:auto;">Ln 142 · Col 8</span>
    <span>zsh</span>
  </div>
  <div style="padding:10px 12px; font-size:10px; color:var(--text-muted); background:var(--surface);">
    title bar 36px · macOS traffic lights · faint cwd top-right · status bar 24px · gruvbox accent dot for AI status
  </div>
</div>
</body></html>
