<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:18px 22px; gap:10px;">
  <div class="banner is-error" style="font-size:13px; align-items:center;">
    <span style="color:var(--accent-danger); font-weight:500;">↩</span>
    <span style="color:var(--text-strong); font-weight:500;">command not found:</span>
    <span style="color:var(--text-secondary); font-family:var(--font-mono);">gti push</span>
    <span style="margin-left:auto; display:inline-flex; align-items:center; gap:6px;">
      <span style="color:var(--text-muted); font-size:11px;">ask valley?</span>
      <span class="kbd">↩</span>
    </span>
  </div>

  <div class="banner is-success" style="font-size:12px;">
    <span style="color:var(--accent-success);">✓</span>
    <span>build succeeded · 4.2s</span>
    <span style="margin-left:auto; color:var(--text-muted);">2:41 PM</span>
  </div>

  <div class="banner is-ai" style="font-size:12px;">
    <span style="color:var(--accent-ai);">◆</span>
    <span>valley suggests <span style="color:var(--text-strong); font-family:var(--font-mono);">git checkout main</span> — accept?</span>
    <span style="margin-left:auto; display:inline-flex; gap:4px;">
      <span class="kbd">tab</span>
    </span>
  </div>

  <div class="banner" style="font-size:12px;">
    <span style="color:var(--accent-info);">i</span>
    <span>nightly build available · run <span style="color:var(--text-strong);">valley update</span></span>
  </div>
</div>
</body></html>
