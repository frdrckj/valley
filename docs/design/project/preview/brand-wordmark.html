<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#1d2021; align-items:center; justify-content:center; min-height:140px;">
  <div style="display:flex; align-items:center; gap:0;">
    <span style="font: 500 56px var(--font-mono); letter-spacing:-1.5px; color:#ebdbb2;">valley</span>
    <span id="cur" style="display:inline-block; width:24px; height:38px; background:#fabd2f; margin-left:6px; opacity:0.55;"></span>
  </div>
  <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-top:6px;">Geist Mono · 500 · −0.026em · cursor #fabd2f</div>
</div>
<script>
  const c=document.getElementById('cur');let on=true;
  setInterval(()=>{on=!on;c.style.opacity=on?0.65:0.15;},550);
</script>
</body></html>
