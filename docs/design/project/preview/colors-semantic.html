<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 28px; }
  .item { display:flex; align-items:center; gap:10px; }
  .dot  { width:14px; height:14px; border-radius:3px; border:1px solid rgba(255,255,255,0.06); }
  .name { font-size:11px; color:var(--text-strong); font-family:var(--font-mono); }
  .ref  { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); margin-left:auto; }
</style></head>
<body>
<div class="card" style="padding:16px 22px; gap:8px;">
  <div class="label">Semantic aliases · dark</div>
  <div class="row2">
    <div class="item"><span class="dot" style="background:#282828"></span><span class="name">surface</span><span class="ref">bg/1</span></div>
    <div class="item"><span class="dot" style="background:#3c3836"></span><span class="name">surface.elevated</span><span class="ref">bg/2</span></div>
    <div class="item"><span class="dot" style="background:#504945"></span><span class="name">border.subtle</span><span class="ref">bg/3</span></div>
    <div class="item"><span class="dot" style="background:#665c54"></span><span class="name">border.strong</span><span class="ref">bg/4</span></div>
    <div class="item"><span class="dot" style="background:#ebdbb2"></span><span class="name">text.primary</span><span class="ref">fg/1</span></div>
    <div class="item"><span class="dot" style="background:#a89984"></span><span class="name">text.muted</span><span class="ref">fg.muted</span></div>
    <div class="item"><span class="dot" style="background:#fabd2f"></span><span class="name">accent.primary</span><span class="ref">yellow</span></div>
    <div class="item"><span class="dot" style="background:#fb4934"></span><span class="name">accent.danger</span><span class="ref">red</span></div>
    <div class="item"><span class="dot" style="background:#b8bb26"></span><span class="name">accent.success</span><span class="ref">green</span></div>
    <div class="item"><span class="dot" style="background:#83a598"></span><span class="name">accent.info</span><span class="ref">blue</span></div>
    <div class="item"><span class="dot" style="background:#d3869b"></span><span class="name">accent.ai</span><span class="ref">purple</span></div>
    <div class="item"><span class="dot" style="background:#fe8019"></span><span class="name">accent.warning</span><span class="ref">orange</span></div>
  </div>
</div>
</body></html>
