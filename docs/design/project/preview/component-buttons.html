<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:18px 20px; gap:16px;">
  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <button class="btn btn-primary">Run command</button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-ghost">Skip</button>
    <button class="btn btn-destructive">Delete branch</button>
    <button class="btn btn-destructive is-solid">Force push</button>
  </div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px 14px; font-size:10px; color:var(--text-muted); align-items:center;">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-destructive">Destructive</button>
    <button class="btn btn-primary" disabled>Disabled</button>

    <span>rest</span><span>rest</span><span>rest</span><span>rest</span><span>opacity 0.45</span>

    <button class="btn btn-primary" style="filter:brightness(1.08)">Hover</button>
    <button class="btn btn-secondary" style="background:var(--surface-hover); border-color:var(--border-strong);">Hover</button>
    <button class="btn btn-ghost" style="background:var(--hover-tint); color:var(--text-strong);">Hover</button>
    <button class="btn btn-destructive" style="background:rgba(251,73,52,0.10);">Hover</button>
    <span></span>

    <button class="btn btn-primary is-focused">Focus</button>
    <button class="btn btn-secondary is-focused">Focus</button>
    <button class="btn btn-ghost is-focused">Focus</button>
    <button class="btn btn-destructive is-focused">Focus</button>
    <span></span>
  </div>
</div>
</body></html>
