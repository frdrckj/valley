<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:18px 24px; gap:14px;">
  <div class="label">Weights & line-heights</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px;">
    <div>
      <div style="font-weight:400; font-size:16px; color:var(--text-primary);">Regular 400</div>
      <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">prose, body</div>
    </div>
    <div>
      <div style="font-weight:500; font-size:16px; color:var(--text-strong);">Medium 500</div>
      <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">labels, buttons</div>
    </div>
    <div>
      <div style="font-weight:600; font-size:16px; color:var(--text-strong);">Semibold 600</div>
      <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">headings</div>
    </div>
  </div>
  <div class="divider"></div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:18px; font-size:11px;">
    <div>
      <div class="label" style="margin-bottom:4px;">terminal · 1.0</div>
      <pre style="margin:0; color:var(--text-primary); font-size:12px; line-height:1.0;">$ ls -la
drwxr-xr-x  .
-rw-r--r--  README.md</pre>
    </div>
    <div>
      <div class="label" style="margin-bottom:4px;">ui · 1.3</div>
      <div style="font-size:13px; line-height:1.3; color:var(--text-primary);">Open in new tab<br>Reveal in Finder</div>
    </div>
    <div>
      <div class="label" style="margin-bottom:4px;">prose · 1.5</div>
      <div style="font-size:13px; line-height:1.5; color:var(--text-primary);">Calm, retro-warm. Ship code, ask valley.</div>
    </div>
  </div>
</div>
</body></html>
