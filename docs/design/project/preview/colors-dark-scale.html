<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1/1; border-radius: 4px; position: relative; border: 1px solid rgba(235,219,178,0.06); }
  .sw .name { position:absolute; left:6px; bottom:6px; font-size:9px; color:rgba(235,219,178,0.7); font-family:var(--font-mono); }
  .sw .hex  { position:absolute; right:6px; top:6px; font-size:9px; color:rgba(235,219,178,0.45); font-family:var(--font-mono); }
</style></head>
<body>
<div class="card" style="padding:18px 22px; gap:10px;">
  <div class="label">Dark · backgrounds</div>
  <div class="scale">
    <div class="sw" style="background:#1d2021"><span class="name">bg/0</span><span class="hex">1d2021</span></div>
    <div class="sw" style="background:#282828"><span class="name">bg/1</span><span class="hex">282828</span></div>
    <div class="sw" style="background:#3c3836"><span class="name">bg/2</span><span class="hex">3c3836</span></div>
    <div class="sw" style="background:#504945"><span class="name">bg/3</span><span class="hex">504945</span></div>
    <div class="sw" style="background:#665c54"><span class="name">bg/4</span><span class="hex">665c54</span></div>
    <div class="sw" style="background:#a89984"><span class="name" style="color:#1d2021">fg.mu</span><span class="hex" style="color:#1d2021">a89984</span></div>
    <div class="sw" style="background:#d5c4a1"><span class="name" style="color:#1d2021">fg/2</span><span class="hex" style="color:#1d2021">d5c4a1</span></div>
    <div class="sw" style="background:#ebdbb2"><span class="name" style="color:#1d2021">fg/1</span><span class="hex" style="color:#1d2021">ebdbb2</span></div>
    <div class="sw" style="background:#fbf1c7"><span class="name" style="color:#1d2021">fg/0</span><span class="hex" style="color:#1d2021">fbf1c7</span></div>
  </div>
</div>
</body></html>
