<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .timeline { position:relative; height:18px; background:var(--surface-elevated); border-radius:4px; overflow:hidden; }
  .bar { position:absolute; top:0; bottom:0; left:0; background:var(--accent-primary); border-radius:4px; }
  .row { display:grid; grid-template-columns:80px 60px 1fr; gap:12px; align-items:center; font-size:11px; }
  .nm { color:var(--text-strong); font-family:var(--font-mono); }
  .ms { color:var(--text-muted); font-family:var(--font-mono); }
  @keyframes runI { 0%,100%{ width:0; } }
  @keyframes runF { 0%,80%{ width:0; } 8%,72%{ width:25%; } }
  @keyframes runN { 0%,80%{ width:0; } 14%,66%{ width:50%; } }
  @keyframes runS { 0%,80%{ width:0; } 22%,58%{ width:80%; } }
</style></head>
<body>
<div class="card" style="padding:18px 24px; gap:8px;">
  <div class="label">Motion · ease cubic-bezier(.2,.8,.2,1)</div>
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div class="row"><span class="nm">instant</span><span class="ms">0ms</span><div class="timeline"><div class="bar" style="width:0;"></div></div></div>
    <div class="row"><span class="nm">fast</span>   <span class="ms">120ms</span><div class="timeline"><div class="bar" style="animation: runF 2.6s var(--ease-standard) infinite;"></div></div></div>
    <div class="row"><span class="nm">normal</span> <span class="ms">200ms</span><div class="timeline"><div class="bar" style="animation: runN 2.6s var(--ease-standard) infinite;"></div></div></div>
    <div class="row"><span class="nm">slow</span>   <span class="ms">320ms</span><div class="timeline"><div class="bar" style="animation: runS 2.6s var(--ease-standard) infinite;"></div></div></div>
  </div>
  <div style="font-size:10px; color:var(--text-muted); margin-top:4px;">All UI motion uses the standard ease. Linear/elastic/bounce reserved for cursor blink only.</div>
</div>
</body></html>
