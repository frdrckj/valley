<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  table { border-collapse:collapse; width:100%; }
  td { padding:4px 0; vertical-align:baseline; }
  td.k { color:var(--text-muted); font-size:10px; width:50px; }
  td.s { color:var(--text-muted); font-size:10px; width:60px; text-align:right; padding-right:18px; }
  td.x { color:var(--text-strong); }
</style></head>
<body>
<div class="card" style="padding:16px 24px; gap:2px;">
  <div class="label" style="margin-bottom:6px;">Type scale · Geist Mono</div>
  <table>
    <tr><td class="k">3xl</td><td class="s">32 / 1.3</td><td class="x" style="font-size:32px; line-height:1.0;">valley</td></tr>
    <tr><td class="k">2xl</td><td class="s">24 / 1.3</td><td class="x" style="font-size:24px;">terminal-aware</td></tr>
    <tr><td class="k">xl</td> <td class="s">20 / 1.3</td><td class="x" style="font-size:20px;">↩ ask valley</td></tr>
    <tr><td class="k">lg</td> <td class="s">16 / 1.3</td><td class="x" style="font-size:16px;">git checkout main</td></tr>
    <tr><td class="k">md</td> <td class="s">14 / 1.3</td><td class="x" style="font-size:14px;">~/code/valley · main</td></tr>
    <tr><td class="k">base</td><td class="s">13 / 1.3</td><td class="x" style="font-size:13px;">$ pnpm dev — default UI text</td></tr>
    <tr><td class="k">sm</td>  <td class="s">12 / 1.3</td><td class="x" style="font-size:12px;">Last activity 2m ago</td></tr>
    <tr><td class="k">xs</td>  <td class="s">11 / 1.3</td><td class="x" style="font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted);">SECTION HEADER</td></tr>
  </table>
</div>
</body></html>
