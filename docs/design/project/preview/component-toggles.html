<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:20px 24px; gap:16px;">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px 18px; align-items:center;">

    <!-- switches -->
    <div style="display:flex; align-items:center; gap:8px;"><div class="switch"></div><span style="font-size:12px;">off</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="switch is-on"></div><span style="font-size:12px;">on</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="switch is-on" style="outline:2px solid var(--border-focus); outline-offset:2px;"></div><span style="font-size:12px;">focus</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="switch" style="opacity:0.45;"></div><span style="font-size:12px; opacity:0.45;">disabled</span></div>

    <!-- checks -->
    <div style="display:flex; align-items:center; gap:8px;"><div class="check"></div><span style="font-size:12px;">unchecked</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="check is-on"></div><span style="font-size:12px;">checked</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="check" style="background:var(--gb-dark-bg-2);"><span style="width:8px; height:1.5px; background:var(--text-muted);"></span></div><span style="font-size:12px;">indeterminate</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="check is-on" style="opacity:0.45;"></div><span style="font-size:12px; opacity:0.45;">disabled</span></div>

    <!-- radios -->
    <div style="display:flex; align-items:center; gap:8px;"><div class="radio"></div><span style="font-size:12px;">option a</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="radio is-on"></div><span style="font-size:12px;">option b</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="radio is-on" style="outline:2px solid var(--border-focus); outline-offset:2px;"></div><span style="font-size:12px;">focus</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div class="radio" style="opacity:0.45;"></div><span style="font-size:12px; opacity:0.45;">disabled</span></div>

  </div>
</div>
</body></html>
