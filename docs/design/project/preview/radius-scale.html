<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:18px; }
  .b { background:var(--surface-elevated); border:1px solid var(--border-subtle); aspect-ratio:1.4/1; display:flex; align-items:flex-end; padding:8px; }
  .nm { font-size:10px; color:var(--text-muted); margin-top:6px; font-family:var(--font-mono); }
  .px { font-size:10px; color:var(--text-strong); font-family:var(--font-mono); }
</style></head>
<body>
<div class="card" style="padding:18px 24px; gap:8px;">
  <div class="label">Radius — default UI is md</div>
  <div class="grid">
    <div><div class="b" style="border-radius:0px;"><span class="px">none · 0</span></div><div class="nm">flush edges</div></div>
    <div><div class="b" style="border-radius:4px;"><span class="px">sm · 4</span></div><div class="nm">chips, kbd</div></div>
    <div><div class="b" style="border-radius:6px; outline:1px dashed var(--accent-primary); outline-offset:-2px;"><span class="px">md · 6</span></div><div class="nm">default UI</div></div>
    <div><div class="b" style="border-radius:8px;"><span class="px">lg · 8</span></div><div class="nm">cards, panels</div></div>
    <div><div class="b" style="border-radius:12px;"><span class="px">xl · 12</span></div><div class="nm">modals, sheets</div></div>
  </div>
</div>
</body></html>
