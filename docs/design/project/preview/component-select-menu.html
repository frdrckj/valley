<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:16px 22px; gap:18px; flex-direction:row; align-items:flex-start;">

  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted);">Select</div>
    <select class="select"><option>Gruvbox Dark</option></select>
    <select class="select" style="border-color:var(--accent-primary); box-shadow:0 0 0 2px var(--focus-ring);"><option>Geist Mono · 13px</option></select>
  </div>

  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted);">Dropdown menu</div>
    <div class="menu" style="min-width:220px;">
      <div class="menu-item"><span style="opacity:0.6;">+</span><span>New tab</span><span style="margin-left:auto; color:#1d2021;" class="kbd-inline"><span class="kbd">⌘T</span></span></div>
      <div class="menu-item" style="background:var(--accent-primary); color:#1d2021;"><span style="opacity:0.85;">↗</span><span>Open in new window</span><span style="margin-left:auto;"><span class="kbd" style="background:rgba(29,32,33,0.15); border-color:rgba(29,32,33,0.25); color:#1d2021;">⌘N</span></span></div>
      <div class="menu-item"><span style="opacity:0.6;">⤓</span><span>Reveal in Finder</span></div>
      <div class="menu-sep"></div>
      <div class="menu-item is-disabled"><span style="opacity:0.5;">⌫</span><span>Close pane</span></div>
    </div>
  </div>

</div>
</body></html>
