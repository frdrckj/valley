<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:18px 22px; gap:14px;">
  <!-- file_read — auto-approved -->
  <div class="toolcall">
    <div class="head">
      <span style="color:var(--accent-info);">▸</span>
      <span class="name">file_read</span>
      <span style="color:var(--text-muted);">src/main.rs · 142 lines</span>
      <span class="badge" style="background:rgba(184,187,38,0.15); color:var(--accent-success);">auto · ✓</span>
    </div>
    <div class="body" style="font-size:11px; opacity:0.85;">read 4.1KB · checksum 3a9f2b…</div>
  </div>

  <!-- write_file — pending approval -->
  <div class="toolcall" style="border-color:var(--accent-primary);">
    <div class="head">
      <span style="color:var(--accent-primary);">◆</span>
      <span class="name">write_file</span>
      <span style="color:var(--text-muted);">src/lib/parser.ts</span>
      <span class="badge" style="background:rgba(250,189,47,0.15); color:var(--accent-primary);">pending · approval</span>
    </div>
    <div class="body" style="font-size:11px; line-height:1.5;">
      <span style="color:var(--accent-success);">+ 14</span> &nbsp; <span style="color:var(--accent-danger);">− 3</span><br>
      <span style="color:var(--text-muted);">add tokenizer for inline ghost suggestions</span>
    </div>
    <div class="actions">
      <button class="btn btn-primary" style="height:24px; font-size:11px;">Approve <span class="kbd" style="background:rgba(29,32,33,0.20); border-color:rgba(29,32,33,0.20); color:#1d2021;">↩</span></button>
      <button class="btn btn-secondary" style="height:24px; font-size:11px;">Diff</button>
      <button class="btn btn-ghost" style="height:24px; font-size:11px; margin-left:auto;">Reject <span class="kbd">esc</span></button>
    </div>
  </div>

  <!-- run_command — pending -->
  <div class="toolcall" style="border-color:var(--accent-warning);">
    <div class="head">
      <span style="color:var(--accent-warning);">▶</span>
      <span class="name">run_command</span>
      <span style="color:var(--text-strong); font-family:var(--font-mono);">pnpm migrate:reset</span>
      <span class="badge" style="background:rgba(254,128,25,0.15); color:var(--accent-warning);">destructive</span>
    </div>
    <div class="actions">
      <button class="btn btn-destructive is-solid" style="height:24px; font-size:11px;">Run anyway</button>
      <button class="btn btn-ghost" style="height:24px; font-size:11px; margin-left:auto;">Cancel</button>
    </div>
  </div>
</div>
</body></html>
