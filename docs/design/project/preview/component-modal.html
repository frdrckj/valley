<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:24px; gap:14px; align-items:center; justify-content:center; background:rgba(0,0,0,0.45);">
  <div style="width:520px; background:var(--gb-dark-bg-2); border:1px solid var(--border-strong); border-radius:8px; box-shadow: 0 2px 6px rgba(0,0,0,0.30), 0 12px 32px rgba(0,0,0,0.45); overflow:hidden;">
    <div style="padding:14px 18px; border-bottom:1px solid var(--border-subtle); display:flex; align-items:center; gap:10px;">
      <span style="color:var(--accent-warning);">▲</span>
      <span style="font-size:14px; font-weight:500; color:var(--text-strong);">Discard 4 unsaved changes?</span>
    </div>
    <div style="padding:16px 18px; font-size:12px; color:var(--text-secondary); line-height:1.5;">
      Closing this pane will lose edits to <span style="color:var(--text-primary);">main.rs</span>, <span style="color:var(--text-primary);">parser.ts</span>, <span style="color:var(--text-primary);">+ 2 more</span>. This cannot be undone.
    </div>
    <div style="padding:10px 14px; border-top:1px solid var(--border-subtle); display:flex; gap:8px; justify-content:flex-end; background:var(--gb-dark-bg-1);">
      <button class="btn btn-ghost">Cancel <span class="kbd">esc</span></button>
      <button class="btn btn-destructive is-solid">Discard <span class="kbd" style="background:rgba(29,32,33,0.20); border-color:rgba(29,32,33,0.20); color:#fbf1c7;">↩</span></button>
    </div>
  </div>
</div>
</body></html>
