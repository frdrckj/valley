<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_components.css"></head>
<body>
<div class="card" style="padding:14px 18px; gap:10px;">
  <div style="font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted);">Pane splitters · focused vs unfocused</div>
  <div style="display:flex; height:120px; gap:0; border:1px solid var(--border-subtle); border-radius:6px; overflow:hidden;">
    <!-- focused pane -->
    <div style="flex:1; background:var(--gb-dark-bg-0); padding:10px 12px; font-size:11px; line-height:1.4; color:var(--text-primary); border-left:2px solid var(--accent-primary); position:relative;">
      <div style="font-size:10px; color:var(--accent-primary); margin-bottom:4px;">▸ focused</div>
      $ pnpm dev<br>
      <span style="color:var(--accent-success);">✓</span> ready in 1.2s<br>
      <span id="cur" style="display:inline-block; width:7px; height:13px; background:var(--gb-dark-fg-0); vertical-align:middle;"></span>
    </div>
    <!-- vertical splitter -->
    <div style="width:1px; background:var(--border-strong); cursor:col-resize;"></div>
    <!-- unfocused right side, with horizontal split inside -->
    <div style="flex:1; display:flex; flex-direction:column; opacity:0.55;">
      <div style="flex:1; padding:8px 10px; font-size:11px; color:var(--text-secondary); background:var(--gb-dark-bg-0);">
        ~/valley · git status<br>
        <span style="color:var(--text-muted);">on branch main</span>
      </div>
      <div style="height:1px; background:var(--border-subtle);"></div>
      <div style="flex:1; padding:8px 10px; font-size:11px; color:var(--text-secondary); background:var(--gb-dark-bg-0);">
        ~/valley · vitest<br>
        <span style="color:var(--text-muted);">42 tests passed</span>
      </div>
    </div>
  </div>
  <div style="font-size:10px; color:var(--text-muted);">focused pane: 2px accent.primary border-left · 1px border.subtle elsewhere · unfocused dims to 0.55</div>
</div>
<script>
  const c=document.getElementById('cur');let on=true;setInterval(()=>{on=!on;c.style.opacity=on?1:0;},520);
</script>
</body></html>
