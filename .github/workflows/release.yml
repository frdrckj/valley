name: release

# Triggered by pushing a v*.*.* tag. Builds the production .app + .dmg
# on a macOS aarch64 runner and uploads them to a GitHub Release with
# the tag's name. Manual workflow_dispatch is also wired for testing
# without cutting an actual release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14   # aarch64 runner
    permissions:
      contents: write   # needed to create a Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm tauri build
        run: pnpm tauri build

      - name: Locate artifacts
        id: artifacts
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "dmg=$DMG" >> $GITHUB_OUTPUT
          echo "Found: $APP / $DMG"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true   # opens as draft so you can edit notes before publishing
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
          body: |
            > **Unsigned macOS build.** After downloading and copying to
            > `/Applications`, strip the Gatekeeper quarantine flag once:
            >
            > ```
            > xattr -d com.apple.quarantine /Applications/Valley.app
            > ```
            >
            > Apple Silicon only.
